apiVersion: 1
datasources:
  - name: ClickHouse
    uid: clickhouse-analytics
    type: grafana-clickhouse-datasource
    access: proxy
    isDefault: true
    jsonData:
      host: clickhouse
      port: 8123
      protocol: http
      username: ${CLICKHOUSE_USER}
      defaultDatabase: ${CLICKHOUSE_DB}
    secureJsonData:
      password: ${CLICKHOUSE_PASSWORD}

